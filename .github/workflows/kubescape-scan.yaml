name: Kubescape Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  kubescape-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
          echo "$HOME/.kubescape/bin" >> $GITHUB_PATH

      - name: Scan good manifests
        run: |
          kubescape scan manifests/good/ --fail-threshold 50

      - name: Scan bad manifests
        run: |
          kubescape scan manifests/bad/ --fail-threshold 100

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"🚨 *Kubescape Security Scan FAILED!*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nCheck results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
