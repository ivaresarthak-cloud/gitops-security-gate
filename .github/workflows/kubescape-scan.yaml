name: Kubescape Security Scan

on:
  push:
    branches: [master]

jobs:
  kubescape-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Slack Alert
        run: exit 1
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"🚨 *Kubescape Security Scan FAILED!*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nCheck results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
