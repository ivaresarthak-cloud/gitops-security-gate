apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-app
  template:
    metadata:
      labels:
        app: insecure-app
    spec:
      containers:
      - name: insecure-app
        image: nginx:latest
        securityContext:
          runAsUser: 0
          privileged: true
          allowPrivilegeEscalation: true
